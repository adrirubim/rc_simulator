name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install system deps (Qt/PySide6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxcb1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxi6 \
            libxrandr2 \
            libxfixes3 \
            libxss1 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Hygiene checks (no build artifacts in src/)
        run: |
          python scripts/audit_layout.py
          pytest -q tests/test_layout_hygiene.py -q

      - name: Architecture guardrail (UI must not import IO)
        run: |
          pytest -q tests/test_architecture.py -q

      - name: Headless entrypoint import smoke test
        env:
          PYTHONPATH: src
        run: |
          python -c "import rc_simulator.__main_headless__"

      - name: Pytest
        env:
          PYTHONPATH: src
        run: |
          pytest -q

