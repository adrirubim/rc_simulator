name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Qt/PySide6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxcb1 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxi6 \
            libxrandr2 \
            libxfixes3 \
            libxss1 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Hygiene checks (no build artifacts in src/)
        run: |
          python scripts/audit_layout.py
          pytest -q tests/test_layout_hygiene.py -q

      - name: Architecture guardrail (UI must not import IO)
        run: |
          pytest -q tests/test_architecture.py -q

      - name: Headless entrypoint import smoke test
        env:
          PYTHONPATH: src
        run: |
          python -c "import rc_simulator.__main_headless__"

      - name: Pytest
        env:
          PYTHONPATH: src
        run: |
          pytest -q

